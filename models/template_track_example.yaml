# Example: template track — weighted slots per `kind`. Omit `sql` for built-in statements, or set `sql`
# for custom SQL (see README and models/template_custom_sql_example.yaml).
# Mutually exclusive with workload.mix.

prepare:
  indexes:
    - name: k
      columns: [k]

run:
  update_columns:
    - k
    - c

workload:
  transaction:
    shape: single
  statements:
    - id: mostly_select
      weight: 8.0
      kind: select
    - id: occasional_insert
      weight: 2.0
      kind: insert
