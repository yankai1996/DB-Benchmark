# Model file for:
#   python3 db_bench.py prepare --model models/example.yaml ...
#   python3 db_bench.py run --model models/example.yaml ...
# (or set `model: models/example.yaml` in the main bench config YAML).

prepare:
  # Extra columns beyond built-ins id, k, c, pad.
  extra_columns:
    - name: ext_note
      type: varchar
      length: 64
      not_null: true
      default: ''

  indexes:
    - name: k
      columns: [k]
    - name: ext_note
      columns: [ext_note]

run:
  # Built-ins for default sbtest-like table: k, c, pad.
  update_columns:
    - k
    - c
    - ext_note
