# Default model (bundled next to db_bench.py). Overridden by --model / config `model`.
# workload: single-statement transactions, 50/50 read/write mix (same as program defaults).
#
# --- Table shape (generated by `prepare`; not executed from this file) ---
# This model has no `prepare.extra_columns`; DDL is emitted per backend.
#
# PostgreSQL (conceptual):
#   CREATE TABLE IF NOT EXISTS <stem|stemN> (
#     id BIGSERIAL PRIMARY KEY,
#     k BIGINT NOT NULL DEFAULT 0,
#     c CHAR(120) NOT NULL DEFAULT '',
#     pad CHAR(60) NOT NULL DEFAULT ''
#   );
#   CREATE INDEX IF NOT EXISTS <table>_k ON <table> (k);
#
# MySQL (conceptual):
#   CREATE TABLE IF NOT EXISTS <stem|stemN> (
#     id BIGINT AUTO_INCREMENT PRIMARY KEY,
#     k BIGINT NOT NULL DEFAULT 0,
#     c CHAR(120) NOT NULL DEFAULT '',
#     pad CHAR(60) NOT NULL DEFAULT '',
#     INDEX idx_<table>_k (k)
#   );

prepare:
  indexes:
    - name: k
      columns: [k]

run:
  update_columns:
    - k
    - c

# --- Workload SQL (mix track; not written in YAML — generated at run time) ---
# `select_list` = `id` plus columns from `run.update_columns` above (here: `id, k, c`).
#
# SELECT:
#   SELECT <select_list> FROM <table> WHERE id = %s
#
# INSERT:
#   PostgreSQL: INSERT INTO <table> (k, c, pad) VALUES (%s, %s, %s) RETURNING id
#   MySQL:      INSERT INTO <table> (k, c, pad) VALUES (%s, %s, %s)
#
# UPDATE (default run.update_columns is k + c):
#   UPDATE <table> SET k = %s, c = %s WHERE id = %s

workload:
  transaction:
    shape: single
  mix:
    single:
      select: 0.5
      insert: 0.5
      update: 0.0
      delete: 0.0
