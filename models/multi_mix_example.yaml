# Mix track + multi-statement transactions. Each transaction runs
# `workload.transaction.statement_count` statements (here: 7), each sampled by
# `workload.mix.multi` — configure this only in the model YAML, not in `-c` config.
#
#   python3 db_bench.py run --model models/multi_mix_example.yaml ...

prepare:
  indexes:
    - name: k
      columns: [k]

run:
  update_columns:
    - k
    - c

workload:
  transaction:
    shape: multi
    statement_count: 7
  mix:
    multi:
      select: 5.0
      insert: 1.0
      update: 1.0
      delete: 1.0
